services:
  rstudio:
    image: ${DOCKER_IMAGE:-iandurbach/secr-workflow-rstudio:latest}
    container_name: ${CONTAINER_NAME:-secr-workshop}
    ports:
      - "${RSTUDIO_BIND_ADDRESS:-127.0.0.1}:${RSTUDIO_PORT:-8787}:8787"
    environment:
      TZ: ${TZ:-UTC}
      ROOT: ${RSTUDIO_ROOT:-false}
      WORKSHOP_PASSWORD: ${WORKSHOP_PASSWORD:?Set WORKSHOP_PASSWORD in .env before starting the workshop container}
      COURSE_MATERIALS_DIR: /srv/workshop/course_materials
      PARTICIPANT_WORK_DIR: /srv/workshop/my_work
    volumes:
      - ./course_materials:/srv/workshop/course_materials:ro
      - ./my_work:/srv/workshop/my_work
    shm_size: "1gb"
    restart: unless-stopped
